# Static system groups used by monad-* services.
#
# Services run with DynamicUser=yes (transient per-service users) and share
# access through these durable groups:
#
#   monad      — full state access (config, keys, ledger). Internal use only.
#                Do NOT add operator/external accounts here.
#
#   monad-ipc  — opt-in IPC access. Anything in /run/monad (mempool.sock,
#                controlpanel.sock, statesync.sock) is owned by this group,
#                so external services can connect to monad sockets just by
#                being added to "monad-ipc" — without inheriting access to
#                the keystore or ledger data.
#
# No static user is created — DynamicUser=yes derives one per service unit.
g monad     - -
g monad-ipc - -
