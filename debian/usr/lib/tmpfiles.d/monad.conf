# Manage monad data directories outside of systemd's StateDirectory= /
# ConfigurationDirectory= machinery, because those redirect to
# /var/lib/private/<name>/ when DynamicUser=yes is in use, and we want the
# canonical FHS paths /etc/monad and /var/lib/monad with shared group access
# across all monad-* services.
#
# /run/monad uses mode 2770 (setgid bit) so unix sockets created inside
# inherit the "monad-ipc" group — letting external services that join only
# that group connect to the sockets without gaining access to the keystore
# or ledger data under /var/lib/monad.
#
# Type Path                       Mode UID  GID        Age Argument
d      /etc/monad                 0750 root monad      -   -
d      /var/lib/monad             0770 root monad      -   -
d      /var/lib/monad/private     0750 root monad      -   -
d      /var/lib/monad/forkpoint   0770 root monad      -   -
d      /var/lib/monad/validators  0770 root monad      -   -
d      /var/lib/monad/ledger      0770 root monad      -   -
d      /run/monad                 2770 root monad-ipc  -   -
