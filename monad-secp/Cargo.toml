[package]
name = "monad-secp"
version = "0.1.0"
edition = "2021"

# this is necessary for criterion bench options
# https://bheisler.github.io/criterion.rs/book/faq.html#cargo-bench-gives-unrecognized-option-errors-for-valid-command-line-options
[lib]
bench = false

[features]
# Enables the `KeyPair::Remote` variant, which offloads signing/ECDH to a
# remote signer (e.g. a SEV-SNP enclave) over a vsock/unix transport.
remote-signer = ["dep:monad-remote-signer-proto"]

[dependencies]
monad-crypto = { workspace = true }
monad-eth-types = { workspace = true }
monad-remote-signer-proto = { workspace = true, optional = true }

alloy-consensus = { workspace = true }
alloy-primitives = { workspace = true, features = ["k256"] }
alloy-rlp = { workspace = true }
hex = { workspace = true }
k256 = { workspace = true }
rand = { workspace = true }
secp256k1 = { workspace = true, features = ["global-context", "recovery", "rand"] }
serde = { workspace = true, features = ["derive"] }
serde_with = { workspace = true }
sha2 = { workspace = true }
zeroize = { workspace = true, features = ["derive"] }

[dev-dependencies]
monad-testutil = { workspace = true }

alloy-consensus = { workspace = true, features = ["k256"] }
alloy-signer = { workspace = true }
alloy-signer-local = { workspace = true }
criterion = { workspace = true }
insta = { workspace = true }
proptest = { workspace = true }
rand = { workspace = true }
rstest = { workspace = true }
tiny-keccak = { workspace = true, features = ["keccak"] }

wycheproof = { workspace = true }

[[bench]]
name = "secp"
harness = false
