[package]
name = "monad-query-store"
version = "0.1.0"
edition = "2021"

# this is necessary for criterion bench options
# https://bheisler.github.io/criterion.rs/book/faq.html#cargo-bench-gives-unrecognized-option-errors-for-valid-command-line-options
[lib]
bench = false

[features]
default = ["s3", "dynamo"]
# Enables `TxEntry::to_rpc_transaction`, converting a stored tx into an
# `alloy_rpc_types_eth::Transaction`. Off by default so the crate stays
# narrow; the consensus envelope is always accessible via `TxEntry::envelope`.
alloy-rpc-types-eth = ["dep:alloy-rpc-types-eth"]
# Enables the S3-API-compatible blob backend (S3BlobStore): AWS S3, MinIO,
# Cloudflare R2, Ceph RGW, etc. Pulls in the AWS SDK + tokio.
s3 = ["dep:aws-config", "dep:aws-sdk-s3"]
# Enables the DynamoDB-API-compatible meta backend (DynamoMetaStore): AWS
# DynamoDB, DynamoDB Local, and ScyllaDB Alternator. Pulls in the AWS SDK +
# tokio.
dynamo = ["dep:aws-config", "dep:aws-sdk-dynamodb"]
# Enables the MongoDB meta backend (MongoMetaStore) and the MongoDB external
# archive reader (MongoExternalBlobReader), so chain-data indexes can live in
# an operator's existing monad-archive MongoDB. Pulls in the MongoDB driver.
mongo = ["dep:mongodb"]

[dependencies]
alloy-primitives = { workspace = true, features = ["rlp"] }
alloy-rpc-types-eth = { workspace = true, optional = true }
aws-config = { workspace = true, optional = true }
aws-sdk-dynamodb = { workspace = true, optional = true }
aws-sdk-s3 = { workspace = true, optional = true }
bytes = { workspace = true }
futures = { workspace = true }
monad-query-errors = { workspace = true }
monad-query-primitives = { workspace = true }
mongodb = { workspace = true, optional = true }
quick_cache = { workspace = true }
serde = { workspace = true, features = ["derive"] }
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }
tracing = { workspace = true }

[dev-dependencies]
bytes = { workspace = true }
hyper-util = { version = "0.1", features = ["server-auto", "http1", "http2", "tokio"] }
# In-process, filesystem-backed S3 server used only by the gated `s3_blobstore`
# integration test (run with `--features s3`). `s3s` provides a hyper/tower
# `S3Service`; `s3s-fs` is its filesystem backend. `hyper-util` serves the
# service over a local TCP listener. These are dev-only and never affect the
# library build (`cargo check` does not compile dev-dependencies).
# Pinned to 0.12: s3s 0.13 raised its MSRV to rustc 1.92, above this
# toolchain. 0.12 has MSRV 1.86 and the same in-process serving API.
s3s = "=0.12.0"
s3s-fs = "=0.12.0"
tempfile = "3"
tokio = { workspace = true, features = ["macros", "net", "rt", "rt-multi-thread", "time"] }
# Dev-only: lets the `read_bench` example surface the query-side debug stats
